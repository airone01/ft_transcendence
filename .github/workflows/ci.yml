name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check:
    name: Typecheck the Codebase
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgres://user:pass@localhost:5432/db"
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Generate Paraglide Files
        run: bun run --cwd=apps/web paraglide

      - name: Typecheck
        run: bun run turbo run check

  lint:
    name: Lint the Codebase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    needs: [check, lint]

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install deps
        run: |
          bun install --frozen-lockfile
          bun playwright install

      - name: Run e2e tests
        continue-on-error: true
        run: bun run e2e
        env:
          DATABASE_URL: postgres://root:mysecretpassword@localhost:5432/local
          DISCORD_CLIENT_ID: 123456789123456789
          DISCORD_CLIENT_SECRET: AAAAAAAAAAAAAAAAAAAAAAAAAAAA
          DISCORD_REDIRECT_URI: http://10.11.4.3:5173/login/discord/callback
          PUBLIC_WS_URL: http://10.11.4.3:3001
          WS_PORT: 3001

  build:
    name: Build Production Image
    runs-on: ubuntu-latest
    needs: [check, lint]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/transc
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha

      - name: Build and optionally push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


